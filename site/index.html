<!DOCTYPE html>
<html lang="en">

<head>
    <title>Folleach</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="content/images/icon.png" />
    <meta name="title" property="title" content="Folleach">
    <meta name="description" property="description" content="Folleach is one of the small creatures in this big world.
                                                             A full-queue developer - if it's more convenient for you">
    <meta name="image" property="image" content="https://folleach.net/content/images/icon.png">
    <meta name="url" property="url" content="https://folleach.net/">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        * {
            font-family: sans-serif;
            color: #133051;
        }

        body {
            background-color: #3062d0;
            background-image: url("content/images/artist.jpg");
            background-position: var(--position, 100% 40%);
            background-size: var(--scale, 200%);
            image-rendering: pixelated;

            height: 100dvh;
            margin: 0;

            user-select: none;
            background-repeat: no-repeat;
            will-change: background-position, background-size;
        }
        h1, p {
            margin: 0.1em 0;
        }
        h1 {
            font-size: 2.7em;
        }
        p {
            font-size: 1.3rem;
        }
        a {
            transition: ease 0.15s;
        }
        a:hover {
            scale: 1.1;
        }

        .filter {
            backdrop-filter: brightness(1.05) saturate(1.3) blur(3px);
        }

        .container {
            position: absolute;
            user-select: text;

            transform: translate(-50%, -50%);

            left: var(--container-left, calc(70% + 2rem));
            top: var(--container-top, calc(65% - 0px));

            background-color: #3b79c133;
            border-radius: 1rem;
            padding: 0.5rem 1.5rem 1.5rem 1.5rem;
            width: 22rem;
            max-width: 90%;

            transition: all 0.2s ease-in-out;
        }

        .expand {
            position: absolute;
            width: 3rem;
            height: 3rem;
            top: 1em;
            right: 1em;
            border-radius: 1rem;
            corner-shape: squircle;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container filter">
        <h1>Folleach</h1>
        <p>A full-queue developer ^_^</p>
        <div style="display: grid; grid-auto-flow: column; text-align: center; margin-top: 2em;">
            <a href="https://github.com/Folleach" aria-label="See my projects on GitHub" style="display: block;">
                <svg height="35" width="60">
                    <image xlink:href="content/images/github.svg" />
                </svg>
            </a>
            <a href="https://folleach.net/l/discord" aria-label="Message me on Discord" style="display: block;">
                <svg height="30" width="60">
                    <image xlink:href="content/images/discord.svg" />
                </svg>
            </a>
            <a href="https://youtube.com/Folleach" aria-label="Watch my videos on YouTube" style="display: block;">
                <svg height="30" width="60">
                    <image xlink:href="content/images/youtube.svg" />
                </svg>
            </a>
            <a href="https://www.twitch.tv/Folleach" aria-label="Watch my streams on Twitch" style="display: block;">
                <svg height="30" width="60">
                    <image xlink:href="content/images/twitch.svg" />
                </svg>
            </a>
        </div>
    </div>

    <div class="expand filter">
        <svg width="3rem" height="3rem">
            <use xlink:href="content/images/icons.svg#expand"></use>
        </svg>
    </div>

    <script>
        const locationsHorizontal = [
            { position: '100% 40%', scale: '200%', cleft: 'calc(70% + 2rem)', ctop: 'calc(65% - 0px)' },
            { position: '10% 5%', scale: '200%', cleft: 'calc(70% + 2rem)', ctop: 'calc(65% - 0px)' },
            { position: '0% 70%', scale: '235%', cleft: 'calc(70% + 2rem)', ctop: 'calc(65% - 0px)' }
        ]
        const locationsVertical = [
            { position: '70% 50%', scale: '700%', cleft: '50%', ctop: '80%' },
            { position: '18% 5%', scale: 'cover 200%', cleft: '50%', ctop: '80%' },
            { position: '6% 80%', scale: 'cover 235%', cleft: '50%', ctop: '80%' }
        ]

        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        let current = rand(0, locationsHorizontal.length);

        function takeLocations() {
            const aspectRatio = window.innerWidth / window.innerHeight;
            if (aspectRatio > 1) {
                return locationsHorizontal;
            }
            else {
                return locationsVertical;
            }
        }

        function update(locations) {
            document.body.style.setProperty('--position', locations[current % locations.length].position);
            document.body.style.setProperty('--scale', locations[current % locations.length].scale);
            const container = document.querySelector('.container');
            container.style.left = locations[current % locations.length].cleft;
            container.style.top = locations[current % locations.length].ctop;
        }

        function next() {
            const locations = takeLocations();
            current += rand(1, locations.length - 1);
            update(locations);
        }

        next();

        document.addEventListener('click', next);
        window.addEventListener('resize', () => update(takeLocations()));
        window.addEventListener('load', () => {
            requestAnimationFrame(() => {
                document.body.style.transition = 'cubic-bezier(0.075, 0.82, 0.165, 1) 0.5s';
            })
        })
        document.querySelector('.container').addEventListener('click', e => e.stopPropagation());
        document.querySelector('.expand').addEventListener('click', e => {
            update([{ position: '80% 50%', scale: 'cover', cleft: '50%', ctop: '65%' }]);
            e.stopPropagation();
        });
    </script>
</body>

</html>
